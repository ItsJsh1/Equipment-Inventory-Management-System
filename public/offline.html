<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1f2937">
    <title>Offline - EIMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f9fafb;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            padding-left: max(20px, env(safe-area-inset-left));
            padding-right: max(20px, env(safe-area-inset-right));
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
        }
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background-color: #fef3c7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon svg {
            width: 40px;
            height: 40px;
            color: #d97706;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 12px;
        }
        p {
            color: #6b7280;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            background-color: #1f2937;
            color: white;
            font-weight: 500;
            font-size: 16px;
            border-radius: 12px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 48px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover {
            background-color: #374151;
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-secondary {
            background-color: #e5e7eb;
            color: #374151;
        }
        .btn-secondary:hover {
            background-color: #d1d5db;
        }
        .status {
            margin-top: 32px;
            padding: 12px 16px;
            background-color: #fef3c7;
            border-radius: 8px;
            font-size: 14px;
            color: #92400e;
            display: none;
        }
        .status.online {
            background-color: #d1fae5;
            color: #065f46;
        }
        .status.show {
            display: block;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #111827;
            }
            .icon {
                background-color: #78350f;
            }
            .icon svg {
                color: #fbbf24;
            }
            h1 {
                color: #f9fafb;
            }
            p {
                color: #9ca3af;
            }
            .btn {
                background-color: #f9fafb;
                color: #111827;
            }
            .btn:hover {
                background-color: #e5e7eb;
            }
            .btn-secondary {
                background-color: #374151;
                color: #f9fafb;
            }
            .btn-secondary:hover {
                background-color: #4b5563;
            }
            .status {
                background-color: #78350f;
                color: #fbbf24;
            }
            .status.online {
                background-color: #065f46;
                color: #6ee7b7;
            }
        }
        @media (min-width: 640px) {
            .btn-group {
                flex-direction: row;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/icons/icon-72x72.png" alt="EIMS" class="logo" onerror="this.style.display='none'">
        <div class="icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"/>
            </svg>
        </div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Some features may be unavailable until you're back online.</p>
        <div class="btn-group">
            <button class="btn" onclick="tryReconnect()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Try Again
            </button>
            <button class="btn btn-secondary" onclick="goBack()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Go Back
            </button>
        </div>
        <div id="status" class="status"></div>
    </div>
    
    <script>
        const statusEl = document.getElementById('status');
        
        function showStatus(message, isOnline = false) {
            statusEl.textContent = message;
            statusEl.className = 'status show' + (isOnline ? ' online' : '');
            setTimeout(() => {
                if (!isOnline) statusEl.className = 'status';
            }, 3000);
        }
        
        function tryReconnect() {
            showStatus('Checking connection...');
            fetch('/', { method: 'HEAD', cache: 'no-store' })
                .then(() => {
                    showStatus('Connection restored! Redirecting...', true);
                    setTimeout(() => window.location.reload(), 500);
                })
                .catch(() => {
                    showStatus('Still offline. Please check your connection.');
                });
        }
        
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        }
        
        // Auto-detect when back online
        window.addEventListener('online', () => {
            showStatus('Back online! Reloading...', true);
            setTimeout(() => window.location.reload(), 500);
        });
        
        // Check connection periodically
        setInterval(() => {
            if (navigator.onLine) {
                fetch('/', { method: 'HEAD', cache: 'no-store' })
                    .then(() => {
                        showStatus('Connection restored! Redirecting...', true);
                        setTimeout(() => window.location.reload(), 500);
                    })
                    .catch(() => {});
            }
        }, 5000);
    </script>
</body>
</html>
